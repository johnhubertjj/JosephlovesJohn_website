<div id="music-share-modal" class="music-share-modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="music-share-title">
    <div class="music-share-dialog">
        <button type="button" class="music-share-close" data-share-close aria-label="Close share dialog">
            <span class="music-share-close-glyph" aria-hidden="true">&times;</span>
        </button>
        <div class="music-share-header">
            <h3 id="music-share-title" class="music-share-title">Share Track</h3>
            <p class="music-share-byline">by JosephlovesJohn and Jayne Connell</p>
        </div>
        <div class="music-share-platforms">
            <a class="music-share-platform is-threads" data-share-platform="threads" href="#" target="_blank" rel="noopener noreferrer" aria-label="Share on Threads">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <path d="M15.3 9.4c-.2-1.8-1.4-2.9-3.6-2.9-2.6 0-4.4 1.8-4.4 4.6 0 3 1.9 4.9 4.7 4.9 2.2 0 3.8-1.2 4-3 0-1.6-1.2-2.7-3.1-2.7-1.6 0-2.7.8-2.7 2 0 1.2 1 2 2.4 2 2.4 0 4.2-1.7 4.2-4.3 0-3.3-2.5-5.7-6-5.7-3.9 0-6.7 2.8-6.7 6.9 0 4.2 2.9 7 7 7 3.5 0 6.2-2.2 6.7-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </a>
            <a class="music-share-platform is-facebook" data-share-platform="facebook" href="#" target="_blank" rel="noopener noreferrer" aria-label="Share on Facebook">
                <svg viewBox="0 0 20 20" aria-hidden="true">
                    <path fill="currentColor" d="M11.86 18v-6.69h2.24L14.43 9h-2.57V7.52c0-.74.2-1.24 1.26-1.24H14.5V4.17C14.26 4.14 13.45 4 12.5 4c-1.98 0-3.34 1.2-3.34 3.44V9H7v2.31h2.16V18h2.7z"></path>
                </svg>
            </a>
            <a class="music-share-platform is-x" data-share-platform="x" href="#" target="_blank" rel="noopener noreferrer" aria-label="Share on X">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M14.1 4h3.1l-6.9 7.88L18.4 20h-6.33l-4.95-5.76L2.06 20H.4l7.23-8.27L0 4h6.48l4.47 5.22L14.1 4zm-1.11 14.14h1.72L5.48 5.76H3.63l9.36 12.38z"></path>
                </svg>
            </a>
            <a class="music-share-platform is-email" data-share-platform="email" href="#" aria-label="Share by email">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <path d="M4 7.5h16v9H4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                    <path d="m5 8.5 7 5 7-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </a>
        </div>
        <label class="music-share-link-label" for="music-share-link">Share link</label>
        <div class="music-share-link-row">
            <input id="music-share-link" class="music-share-link-input" type="text" readonly />
            <button type="button" class="music-share-copy" data-share-copy aria-label="Copy share link">
                <span class="music-share-copy-label" data-share-copy-label>Copy</span>
            </button>
        </div>
    </div>
</div>
