<div id="art-lightbox" class="art-lightbox" role="dialog" aria-hidden="true" aria-label="Expanded artwork">
    <button type="button" class="art-lightbox-close" data-art-close aria-label="Close expanded artwork">&times;</button>
    <div class="art-lightbox-inner">
        <img class="art-lightbox-image" alt="" />
        <video class="art-lightbox-video" playsinline webkit-playsinline controls hidden></video>
        <p class="art-lightbox-caption"></p>
    </div>
</div>
