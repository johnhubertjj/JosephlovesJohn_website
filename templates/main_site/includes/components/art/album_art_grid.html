<div class="album-art-grid">
    {% for item in album_art_items %}
        <figure class="album-art-card{% if item.featured %} is-featured{% endif %}">
            {% if item.kind == 'image' %}
                <a href="{{ item.url }}" data-art-lightbox="image" data-art-caption="{{ item.caption }}">
                    <picture>
                        {% if item.thumbnail_webp_url %}<source srcset="{{ item.thumbnail_webp_url }}" type="image/webp" />{% endif %}
                        <img{% if item.fit_contain %} class="is-contain"{% endif %} src="{{ item.thumbnail_url|default:item.url }}" alt="{{ item.alt|default:item.caption }}" loading="lazy" decoding="async" />
                    </picture>
                </a>
            {% elif item.kind == 'video' %}
                <video controls preload="metadata" playsinline{% if item.poster_url %} poster="{{ item.poster_url }}"{% endif %}>
                    <source src="{{ item.url }}" type="{{ item.mime_type }}" />
                </video>
            {% endif %}
            <figcaption>{{ item.caption }}</figcaption>
        </figure>
    {% empty %}
        <p class="art-empty-note">Album artwork is being refreshed. Check back soon.</p>
    {% endfor %}
</div>
