{% load static asset_urls %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ seo.title }}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ seo.description }}" />
    <meta name="robots" content="{{ seo.robots }}" />
    <link rel="canonical" href="{{ seo.canonical_url }}" />
    <meta property="og:title" content="{{ seo.title }}" />
    <meta property="og:description" content="{{ seo.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ seo.canonical_url }}" />
    <meta property="og:image" content="{{ seo.image_url }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ seo.title }}" />
    <meta name="twitter:description" content="{{ seo.description }}" />
    <meta name="twitter:image" content="{{ seo.image_url }}" />
    <link rel="icon" type="image/png" href="{{ 'images/jlovesj_symbol-my_version3.png'|asset_url }}" />
    <link rel="stylesheet" href="{% static 'mastering/assets/css/main.css' %}" />
</head>
<body class="is-preload">
<div id="page-wrapper">
    <header id="header" class="alt">
        <h1><a href="{% url 'mastering:home' %}">Mastering Services</a></h1>
        <nav>
            <a href="{% url 'main_site:main' %}">Main Site</a>
        </nav>
    </header>

    <section id="banner">
        <div class="inner">
            <h2>Future Subfolder</h2>
            <p>The subfolder <strong>{{ subfolder }}</strong> is reserved for future mastering pages.</p>
            <p>When you decide structure, this route can map to dedicated templates and views.</p>
        </div>
    </section>
</div>
</body>
</html>
