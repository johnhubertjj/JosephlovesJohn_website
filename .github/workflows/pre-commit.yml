name: quality-checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Run pre-commit (changed files)
        env:
          SKIP: no-commit-to-branch,django-check,django-migrations-check,ruff,mypy,pytest
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run pre-commit run \
              --from-ref "origin/${{ github.base_ref }}" \
              --to-ref HEAD \
              --show-diff-on-failure \
              --color=always
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              uv run pre-commit run \
                --from-ref HEAD~1 \
                --to-ref HEAD \
                --show-diff-on-failure \
                --color=always
            else
              uv run pre-commit run --all-files --show-diff-on-failure --color=always
            fi
          fi

  django-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: josephlovesjohn_site.settings
        run: uv run python manage.py check

      - name: Check for missing migrations
        env:
          DJANGO_SETTINGS_MODULE: josephlovesjohn_site.settings
        run: uv run python manage.py makemigrations --check --dry-run

  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check josephlovesjohn_site main_site mastering shop tests --exclude shop/migrations

  mypy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Run Mypy
        env:
          DJANGO_SETTINGS_MODULE: josephlovesjohn_site.settings
        run: uv run mypy

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Run Pytest with coverage threshold
        env:
          DJANGO_SETTINGS_MODULE: josephlovesjohn_site.settings
        run: uv run pytest --cov --cov-report=term-missing -q

  browser-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --frozen --group dev

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run browser tests
        env:
          DJANGO_SETTINGS_MODULE: josephlovesjohn_site.settings
        run: uv run pytest -q --run-browser -m browser
